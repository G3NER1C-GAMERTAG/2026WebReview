<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <!-- What are tables used for? Displaying data. -->
    <!-- NEVER use tables for layout design -->
    <table>
        <thead>
            <tr>
                <th>Unit</th>
                <th>Topic</th>
                <th>Project</th>
            </tr>
        </thead>
      
        <tbody>
            <tr>
                <td>Unit 1</td>
                <td>Fundamentals of HTML</td>
                <td>Personal Webpage</td>
            </tr>
            <tr>
                <td>Unit 2</td>
                <td>CSS Styling</td>
                <td>Style the Personal Webpage</td>
            </tr>
            <tr>
                <td>Unit 3</td>
                <td>Cybersecurity</td>
                <td>Multiple</td>
            </tr>
        </tbody>
    </table>
 
</body>
</html>
